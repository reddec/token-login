name: Test on PR
on:
  pull_request:

env:
  REGISTRY: ghcr.io
permissions:
  contents: read
jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.26'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: 'web/admin-ui/package-lock.json'
          node-version: 20
          cache: 'npm'

      - name: Build frontend
        run: |
          cd web/admin-ui
          npm install
          npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.26'
        id: go

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Check out code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Pull tag
        run: git fetch --tags

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: 'web/admin-ui/package-lock.json'
          node-version: 20
          cache: 'npm'

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true

      - name: Build frontend
        run: |
          cd web/admin-ui
          npm install
          npm run build

      - name: Run tests
        run: make test

      - name: Run migration tests
        run: exec ./migration-test.sh
